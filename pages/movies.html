<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoviesDekho - Movies</title>

  <link rel="stylesheet" href="../css/navbar.css?v=10">
  <link rel="stylesheet" href="../css/movies.css?v=9">
  <link rel="shortcut icon" href="../assets/img/favicon.png" type="image/x-icon">
</head>

<body class="static-page">

  <div id="navbar-container"></div>

  <section class="movie-tools">
    <div class="tools-header">
      <h2 class="section-title">Discover Movies</h2>
      <p id="resultCount"></p>
    </div>

    <div class="catalog-actions">
      <button id="filterToggle" type="button">Filters</button>
      <button id="showAll" type="button">All Movies</button>
    </div>

    <div class="controls-row">
      <input type="search" id="movieSearch" placeholder="Search title or genre">

      <select id="genreFilter" aria-label="Filter by genre">
        <option value="all">All Genres</option>
      </select>

      <select id="sortFilter" aria-label="Sort movies">
        <option value="rating-desc">Top Rated</option>
        <option value="year-desc">Newest</option>
        <option value="title-asc">A to Z</option>
        <option value="rating-asc">Lowest Rated</option>
      </select>

      <button id="clearFilters" type="button">Clear</button>
    </div>

    <div class="genre-chips" id="genreChips"></div>
  </section>

  <section>
    <h2 class="section-title">Featured Picks</h2>
    <div class="row featured-row" id="featuredRow"></div>
  </section>

  <section>
    <h2 class="section-title">Top 10 Movies</h2>
    <div class="row" id="top10Row"></div>
  </section>

 
  <section>
    <h2 class="section-title">Trending Now</h2>
    <div class="row" id="trendingRow"></div>
  </section>

  
  <section>
    <h2 class="section-title">Latest Releases</h2>
    <div class="row" id="latestRow"></div>
  </section>

  <section>
    <h2 class="section-title">Top Rated</h2>
    <div class="row" id="topRatedRow"></div>
  </section>


  <section id="categories"></section>

  <template id="moviecard">
    <div class="movie-card">
      <button class="card-watchlist" type="button" title="Add to watchlist">+</button>
      <span class="movie-badge"></span>
      <img class="movie-poster">
      <div class="movie-info">
        <h4 class="movie-title"></h4>
        <p class="movie-meta"></p>
        <p class="movie-rating"></p>
        <p class="movie-genre"></p>
        <span class="review"></span>
      </div>
    </div>
  </template>


  <template id="category">
    <div class="category-block">
      <h2 class="section-title category-title"></h2>
      <div class="category-row"></div>
    </div>
  </template>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../js/watchlist.js?v=3"></script>
  <script src="../js/loadcomponent.js"></script>
  <script src="../js/movies.js?v=6"></script>

</body>
</html>
