<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Details</title>

  <link rel="stylesheet" href="../css/navbar.css?v=10">
<link rel="stylesheet" href="../css/movie.css?v=14">
<link rel="shortcut icon" href="../assets/img/favicon.png" type="image/x-icon">
</head>
<body>

<div id="navbar-container"></div>

<section class="movie-hero" id="hero">
  <div class="hero-overlay"></div>
  <div class="movie-hero-content">
    <img id="poster" class="detail-poster" alt="">
    <div class="detail-copy">
      <span class="eyebrow" id="typeLabel"></span>
      <h1 id="t"></h1>
      <p id="i"></p>
      <div class="genre-tags" id="genreTags"></div>
      <p id="d"></p>
      <div class="hero-actions">
        <button id="watchBtn">Add to Watchlist</button>
        <button id="trailerBtn" type="button">Watch Trailer</button>
        <button id="shareBtn" type="button">Share</button>
      </div>
    </div>
  </div>
</section>

<main class="detail-shell">
  <section class="rating-grid" id="ratingGrid"></section>

  <section class="two-column">
    <article class="glass-panel">
      <h2>Storyline</h2>
      <p id="storyline"></p>
      <div class="credit-grid" id="credits"></div>
    </article>
    <aside class="glass-panel">
      <h2>Streaming Availability</h2>
      <div id="availability"></div>
    </aside>
  </section>

  <section class="section">
    <h2>Cast</h2>
    <div class="cast-row" id="castRow"></div>
  </section>

  <section class="section">
    <h2>Screenshots Gallery</h2>
    <div class="gallery" id="gallery"></div>
  </section>

  <section class="section hidden-section" id="seriesSection">
    <h2>Seasons & Episodes</h2>
    <div class="season-nav" id="seasonNav"></div>
    <div class="episode-list" id="episodeList"></div>
  </section>

  <section class="two-column">
    <article class="glass-panel">
      <h2>Production Info</h2>
      <div class="info-list" id="productionInfo"></div>
    </article>
    <article class="glass-panel">
      <h2>Awards & Fun Facts</h2>
      <div class="timeline" id="timeline"></div>
    </article>
  </section>

  <section class="section" id="reviews">
    <h2>Reviews</h2>
    <div class="review-list" id="reviewList"></div>
    <div class="review-form">
      <div class="rating-input" id="stars"></div>
      <textarea id="inp" placeholder="Write review..."></textarea>
      <button id="btn">Submit Review</button>
    </div>
    <template id="rev-temp">
      <p></p>
    </template>
  </section>

  <section class="section">
    <h2>Related Recommendations</h2>
    <div class="related" id="rel"></div>
  </section>
</main>

<div class="modal" id="trailerModal">
  <button id="closeTrailer" type="button" aria-label="Close trailer">×</button>
  <iframe id="trailer" allowfullscreen></iframe>
</div>

<template id="rel-temp">
  <article class="mini-card">
    <img>
    <strong></strong>
  </article>
</template>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="../js/watchlist.js?v=3"></script>
<script src="../js/movie.js?v=19"></script>
<script src="../js/loadcomponent.js"></script>
</body>
</html>
