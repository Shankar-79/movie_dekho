<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Details</title>

<link rel="stylesheet" href="../css/movie.css">
<link rel="stylesheet" href="../css/navbar.css">
<link rel="shortcut icon" href="../assets/img/favicon.png" type="image/x-icon">
</head>

<body>

<div id="navbar-container" class="navbar"></div>


<section class="movie-hero" id="hero">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1 id="t"></h1>
    <p id="i"></p>
    <div class="hero-content">
  <h1 id="title"></h1>
  <p id="info"></p>
 <button id="watchBtn">❤️</button>
</div>
  </div>
</section>


<section class="section">
  <h2>Description</h2>
  <p id="d"></p>
</section>
<section class="section">
  <h2>Trailer</h2>
  <div class="trailer-container">
    <iframe id="trailer" allowfullscreen></iframe>
  </div>
</section>


<section class="section">
  <h2>Reviews</h2>

  <div id="reviews"></div>

  <div class="rating-input" id="stars"></div>

  <textarea id="inp" placeholder="Write review..."></textarea>
  <button id="btn">Submit Review</button>

 
  <template id="rev-temp">
    <p></p>
  </template>
</section>


<section class="section">
  <h2>Related Movies</h2>
  <div class="related" id="rel"></div>


  <template id="rel-temp">
    <img>
  </template>
</section>
<script src="../js/watchlist.js"></script>
<script src="../js/movie.js"></script>
<script src="../js/loadcomponent.js"></script>

</body>
</html>
